aid: customer-database
name: Customer Database
description: >-
  Customer Database is the topic dedicated to APIs, schemas, vocabularies, and reference
  designs for the systems of record that store customer identity, profile, contact,
  preference, consent, and account data. A customer database underpins CRM, marketing
  automation, customer data platforms (CDPs), customer service, billing, and analytics
  use cases, and is increasingly expected to support API-first access, schema-on-write
  data quality, real-time eventing, GDPR/CCPA consent and erasure workflows, and identity
  resolution across web, mobile, and offline channels. This repository tracks the
  vendors, standards, and patterns that make customer data accessible, governed, and
  portable.
